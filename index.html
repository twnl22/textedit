<!doctype html>
<html lang="en">

        <meta charset="UTF-8" />

        <title>textedit</title>

    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            font-family: sans-serif;
        }

        html,
        body {
            width: 100%;
            height: 100%;
        }

        header {
            display: flex;
            overflow-x: scroll;
            scrollbar-width: none;
        }

        header > button,
        header > input,
        header > .btn {
            flex: 1;
            height: 40px;
            border-bottom: none;
        }

        :is(header > button, header > input, .btn):not(:last-child) {
            border-right: none;
        }

        body {
            margin: 0;
            padding: 10px 5%;
            display: flex;
            flex-direction: column;
        }

        main {
            display: flex;
            flex-direction: column;
            gap: 5px;
            flex: 1;
        }

        input,
        textarea,
        button,
        .btn {
            outline: none;
            border: 1px solid #d6d6d6;
            background-color: transparent;
            padding: 3px;
        }

        textarea {
            resize: none;
        }

        :is(button, .btn):hover {
            background-color: #f6f6f6;
        }

        .buttonimg {
            width: 20px;
            height: 20px;
            transition: transform 0.3s;
        }

        :is(button, .btn):hover .buttonimg {
            transform: scale(0.9) translateY(2px);
        }

        :is(button, .btn):has(.buttonimg) {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        :is(input, textarea):hover {
            border: 1px solid #c6c6c6;
        }

        #contentInput {
            flex: 1;
        }

        .msg {
            display: flex;
            align-items: center;
            padding-bottom: 10px;
        }
        .msg-content {
            padding: 3px;
            flex: 1;
            border: 1px solid #d6d6d6;
            height: 100%;
        }
        #msgclearBtn {
            height: 100%;
            border-left: none;
        }
        .messages {
            display: none;
        }
        .font-setting {
            display: flex;
            align-items: center;
            gap: 5px;
        }
    </style>

        <div class="msg">
            <div class="msg-content">메세지가 여기에 표시됩니다.</div>

                <img
                    src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyNCIgaGVpZ2h0PSIyNCIgdmlld0JveD0iMCAwIDI0IDI0IiBmaWxsPSJub25lIiBzdHJva2U9ImN1cnJlbnRDb2xvciIgc3Ryb2tlLXdpZHRoPSIyIiBzdHJva2UtbGluZWNhcD0icm91bmQiIHN0cm9rZS1saW5lam9pbj0icm91bmQiIGNsYXNzPSJsdWNpZGUgbHVjaWRlLXgtaWNvbiBsdWNpZGUteCI+PHBhdGggZD0iTTE4IDYgNiAxOCIvPjxwYXRoIGQ9Im02IDYgMTIgMTIiLz48L3N2Zz4="
                    alt="close"
                    class="buttonimg"
                />
            </button>
        </div>

        <main>
            <input
                type="text"
                name="title"
                id="titleInput"
                placeholder="제목"
            />
            <textarea name="content" id="contentInput"></textarea>
        </main>

        <div class="messages">
            <div class="font-setting">
                <span>폰트:</span>
                <input type="text" id="fontInput" />
            </div>
        </div>

        <script>
            const $ = (a) => document.querySelector(a);
            const uploadBtn = $("#uploadBtn");
            const downloadBtn = $("#downloadBtn");
            const plusBtn = $("#plusBtn");
            const minusBtn = $("#minusBtn");
            const resetBtn = $("#resetBtn");
            const msgclearBtn = $("#msgclearBtn");
            const fontBtn = $("#fontBtn");
            const titleInput = $("#titleInput");
            const contentInput = $("#contentInput");
            const msgContent = $(".msg-content");
            const clearBtn = $("#clearBtn");
            const emptyMessage = msgContent.innerText;
            let lastSave = new Date().getSeconds();

            let inputFontsize = Number(
                localStorage.getItem("font-size") || "16",
            );
            let inputFont = localStorage.getItem("font") || "sans-serif";

            fontBtn.title = inputFont;
            [minusBtn, plusBtn, resetBtn].forEach((it) => {
                it.title = inputFontsize;
            });

            contentInput.value = localStorage.getItem("content") || "";
            titleInput.value = localStorage.getItem("title") || "";

            const updateFontsize = () => {
                titleInput.style.fontSize = `${inputFontsize}px`;
                contentInput.style.fontSize = `${inputFontsize}px`;
                msgContent.innerText = "글자 크기: " + inputFontsize;
                localStorage.setItem("font-size", inputFontsize);
            };

            const updateFont = () => {
                titleInput.style.fontFamily = inputFont;
                contentInput.style.fontFamily = inputFont;

                localStorage.setItem("font", inputFont);

                let fontInput = $("#fontInput");
                fontInput.value = inputFont;
            };

            const updateContent = () => {
                if (
                    msgContent.innerHTML === emptyMessage ||
                    msgContent.innerText.startsWith("저장됨.")
                ) {
                    msgContent.innerText =
                        "저장됨. " + new Date().toLocaleTimeString();
                }
                localStorage.setItem("content", contentInput.value);
                localStorage.setItem("title", titleInput.value);
            };

            let saveTimer;
            const scheduleSave = () => {
                clearTimeout(saveTimer);

                saveTimer = setTimeout(() => {
                    updateContent();
                }, 1000);
            };

            plusBtn.addEventListener("click", () => {
                inputFontsize += 2;
                updateFontsize();
            });
            minusBtn.addEventListener("click", () => {
                inputFontsize = Math.max(1, inputFontsize - 2);
                updateFontsize();
            });
            resetBtn.addEventListener("click", () => {
                inputFontsize = 16;
                updateFontsize();
            });
            fontBtn.addEventListener("click", () => {
                msgContent.innerHTML = $(".font-setting").innerHTML;

                const fontInput = $("#fontInput");
                fontInput.value = inputFont;
                fontInput.focus();

                fontInput.oninput = (e) => {
                    inputFont = e.target.value;
                    updateFont();
                };
            });
            msgclearBtn.addEventListener("click", () => {
                msgContent.innerHTML = emptyMessage;
            });
            uploadBtn.addEventListener("change", async () => {
                const file = uploadBtn.files[0];

                if (!file) return;

                contentInput.value = await file.text();
                titleInput.value = file.name.replace(/\.[^.]+$/, "");
                updateContent();
            });
            downloadBtn.addEventListener("click", () => {
                const title = titleInput.value.trim() || "untitled";
                const content = contentInput.value;

                const blob = new Blob([content], {
                    type: "text/plain;charset=utf-8",
                });

                const url = URL.createObjectURL(blob);

                const a = document.createElement("a");
                a.href = url;
                a.download = `${title}.txt`;

                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);

                URL.revokeObjectURL(url);

                msgContent.innerText = "다운로드 완료";
            });
            contentInput.addEventListener("input", scheduleSave);
            titleInput.addEventListener("input", scheduleSave);
            clearBtn.addEventListener("click", () => {
                let yes = confirm("정말 내용을 삭제하시겠습니까?");
                if (yes) {
                    contentInput.value = "";
                    titleInput.value = "";
                    localStorage.removeItem("content");
                    localStorage.removeItem("title");
                    msgContent.innerText = "내용을 삭제했습니다.";
                }
            });
        </script>
    </body>
</html>
